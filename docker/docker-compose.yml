# O banco de dados é externo (Supabase) — não faz parte do Docker.
# A URL de conexão vem da variável URL_DATABASE no .env da raiz.

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: clinplay_api
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8080:8080"
    environment:
      # Sobrescreve o caminho local do .env para o caminho dentro do container
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-credentials.json
    volumes:
      - ../src/main/resources/firebase-credentials.json:/run/secrets/firebase-credentials.json:ro
      - ../logs:/app/logs
